# Compose Production cho VPS — KÉO image từ GHCR (không build tại chỗ).
# File này nằm sẵn ở /opt/hungsilver trên VPS (CD tự scp lên mỗi lần deploy).
# Cần file .env cùng thư mục (xem .env.example) chứa secrets + GHCR_OWNER, IMAGE_TAG.
# Chạy thủ công:  docker compose -f docker-compose.prod.yml pull && docker compose -f docker-compose.prod.yml up -d
services:
  postgres:
    image: postgres:18-alpine
    container_name: hungsilver-postgres
    environment:
      POSTGRES_DB: hungsilver
      POSTGRES_USER: hungsilver
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Thiếu POSTGRES_PASSWORD trong .env}
    volumes:
      # PG 18+: mount tại /var/lib/postgresql
      - hungsilver_pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hungsilver -d hungsilver"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  api:
    image: ghcr.io/${GHCR_OWNER:?Thiếu GHCR_OWNER trong .env}/hungsilver-api:${IMAGE_TAG:-latest}
    container_name: hungsilver-api
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__Default: Host=postgres;Port=5432;Database=hungsilver;Username=hungsilver;Password=${POSTGRES_PASSWORD}
      Jwt__Secret: ${JWT_SECRET:?Thiếu JWT_SECRET trong .env (tối thiểu 32 ký tự)}
      Google__ClientId: ${GOOGLE_CLIENT_ID:-}
      Seed__AdminEmail: ${ADMIN_EMAIL:-admin@hungsilver.local}
      Seed__AdminPassword: ${ADMIN_PASSWORD:-Admin@12345}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  client:
    image: ghcr.io/${GHCR_OWNER:?Thiếu GHCR_OWNER trong .env}/hungsilver-client:${IMAGE_TAG:-latest}
    container_name: hungsilver-client
    ports:
      - "${HTTP_PORT:-80}:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  hungsilver_pgdata:
