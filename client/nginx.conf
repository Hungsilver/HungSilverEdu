server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # API: proxy sang service "api" trong docker-compose (giữ nguyên path /api/...)
    location /api/ {
        proxy_pass http://api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Cho phép upload file tới 25MB (≥ FileStorage.MaxSizeBytes 20MB + headroom); mặc định nginx chỉ 1MB.
        client_max_body_size 25m;
    }

    # SPA fallback: mọi route Angular đều trả index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
}
